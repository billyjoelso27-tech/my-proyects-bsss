<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/loginstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="signup-body">

    <div class="main-container">
        
    <div class="wrapper">
        <h2>Sign Up</h2>
        <form action="#">
            <div class="input-box">
                <span class="icon"><i class="fas fa-user"></i></span>
                <input type="text" required>
                <label>Username</label>
            </div>
            <div class="input-box">
                <span class="icon"><i class="fas fa-envelope"></i></span>
                <input type="email" required>
                <label>Email</label>
            </div>
            <div class="input-box">
                <span class="icon"><i class="fas fa-lock"></i></span>
                <input type="password" required>
                <label>Password</label>
            </div>
            <div class="input-box">
                <span class="icon"><i class="fas fa-lock"></i></span>
                <input type="password" required>
                <label>Confirm Password</label>
            </div>

            <button type="submit" class="btn">Sign Up</button>

            <div class="wrapper2"> 
                <div class="social-wrapper">
            <h3>Join us with</h3>
            <div class="social-signup-buttons">
                <button><i class="fab fa-google"></i> sign up with Google</button>
                <button><i class="fab fa-facebook-f"></i> sign up with Facebook</button>
                <button><i class="fab fa-instagram"></i> sign up with Instagram</button>
            </div>

    </div>
    
</body>
</html>
